server:
  port: 8080

spring:
  application:
    name: library-management
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/library_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 4MB

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

library:
  jwt:
    issuer: library-management
    # Demo key only. Override with env-specific config before production.
    secret: "library-demo-secret-key-change-me-library-demo-secret-key"
    access-token-minutes: 480
  borrowing:
    default-days: 30
    max-renew-count: 2
    fine-per-day: 0.50
